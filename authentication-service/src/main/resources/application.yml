server:
  port: 8001

spring:
  application:
    name: auth-service
  datasource:
    url: jdbc:postgresql://localhost:5001/db
    username: admin
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update

logging:
  level:
    org.flywaydb: DEBUG
    org.springframework.boot.autoconfigure.flyway: DEBUG
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
